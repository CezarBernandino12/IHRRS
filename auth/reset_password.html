<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
    <title>Reset Password</title>
</head>
<body>
    <div class="container">
        <div id="login-form">
            <img src="../img/logo.png" class="Img" alt="Logo">
            <h2>Reset Your Password</h2>

            <div id="tokenError" style="display:none; color:#c0392b; text-align:center; margin-bottom:12px; padding:10px; background:#fde8e8; border-radius:6px;"></div>

            <form id="resetForm" style="display:none;" autocomplete="off">
                <label>New Password</label>
                <div class="input-box">
                    <span class="icon"><i class="bx bx-lock"></i></span>
                    <input type="password" id="newPassword" placeholder="Enter new password" required autocomplete="new-password">
                </div>

                <label>Confirm Password</label>
                <div class="input-box">
                    <span class="icon"><i class="bx bx-lock-alt"></i></span>
                    <input type="password" id="confirmPassword" placeholder="Re-enter new password" required autocomplete="new-password">
                </div>

                <small style="display:block; margin-bottom:10px; color:#666;">
                    Password must be at least 8 characters with at least one uppercase letter and one number.
                </small>

                <div id="formError" style="color:#c0392b; margin-bottom:8px; display:none; padding:8px; background:#fde8e8; border-radius:4px;"></div>

                <button type="submit" class="login-btn">SET NEW PASSWORD</button>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Password Updated</h3>
            <p>Your password has been changed successfully. You can now log in with your new password.</p>
            <button onclick="window.location.href='../auth/role'" class="login-btn">Go to Login</button>
        </div>
    </div>

    <script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');

        // A valid raw token is exactly 64 hex characters
        if (!token || !/^[0-9a-f]{64}$/.test(token)) {
            const errEl = document.getElementById('tokenError');
            errEl.textContent = 'Invalid or missing reset link. Please contact your administrator to generate a new one.';
            errEl.style.display = 'block';
            return;
        }

        document.getElementById('resetForm').style.display = 'block';

        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv        = document.getElementById('formError');
            const regex           = /^(?=.*[A-Z])(?=.*\d).{8,}$/;

            if (!regex.test(newPassword)) {
                errorDiv.textContent = 'Password must be at least 8 characters with one uppercase letter and one number.';
                errorDiv.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('token', token);
            formData.append('new_password', newPassword);

            fetch('php/do_reset_password', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('successModal').style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || 'An error occurred. Please try again.';
                    errorDiv.style.display = 'block';
                }
            })
            .catch(() => {
                errorDiv.textContent = 'A network error occurred. Please try again.';
                errorDiv.style.display = 'block';
            });
        });
    })();
    </script>
</body>
</html>
