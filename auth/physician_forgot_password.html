<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../img/logo.png" />
  <title>Forgot Password - Physician</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --border: rgba(0,60,140,0.1);
      --border-focus: rgba(21,96,212,0.4);
      --blue: #1560d4;
      --blue-dim: rgba(21,96,212,0.09);
      --cyan: #0097a7;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --success: #16a34a;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(21,96,212,0.12) 0%, transparent 70%);
      top: -180px;
      left: -120px;
      animation: drift 22s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,151,167,0.09) 0%, transparent 70%);
      bottom: -100px;
      right: -80px;
      animation: drift 28s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(30px,20px) scale(1.07); }
    }

    .ihrss-page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .ihrss-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      width: 100%;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(244,247,251,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .ihrss-nav-brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .ihrss-nav-wordmark {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text);
    }

    .ihrss-back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .ihrss-back-btn:hover {
      color: var(--blue);
      border-color: rgba(21,96,212,0.2);
      background: var(--blue-dim);
    }

    .ihrss-back-btn i {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .ihrss-back-btn:hover i {
      transform: translateX(-3px);
    }

    .ihrss-main {
      flex: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 48px;
    }

    #login-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 40px rgba(21,96,212,0.1), 0 1px 4px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.7s ease 0.3s both;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      text-align: center;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--blue-dim);
      border: 1px solid rgba(21,96,212,0.15);
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 18px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.5; }
    }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 18px;
    }

    .card-sub {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
    }

    form {
      width: 100%;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 7px;
    }

    .input-box {
      position: relative;
      margin-bottom: 20px;
    }

    .input-box .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--light);
      font-size: 1.05rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-box:focus-within .icon {
      color: var(--blue);
    }

    .input-box input {
      width: 100%;
      height: 48px;
      padding: 0 16px 0 44px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .input-box input::placeholder {
      color: var(--light);
    }

    .input-box input:focus {
      border-color: var(--border-focus);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(21,96,212,0.08);
    }

    .login-btn {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(21,96,212,0.28);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, background 0.2s;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 10px 32px rgba(21,96,212,0.35);
    }

    .login-btn:hover::after {
      opacity: 1;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(17,24,39,0.4);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal[style*="block"] {
      display: flex !important;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.12);
      animation: riseIn 0.4s ease both;
    }

    .modal-content h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }

    .modal-content p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-content .login-btn {
      height: 44px;
      margin-top: 0;
      background: var(--blue);
      box-shadow: none;
    }

    .modal-content .login-btn:hover {
      background: #1251b5;
      transform: translateY(-1px);
      box-shadow: none;
    }

    @keyframes riseIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 520px) {
      .ihrss-nav {
        padding: 0 20px;
      }

      #login-form {
        padding: 36px 24px;
        border-radius: 20px;
      }

      .ihrss-main {
        padding: 104px 20px 40px;
      }

      .ihrss-nav-wordmark {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="ihrss-page">
    <nav class="ihrss-nav">
      <a href="../" class="ihrss-nav-brand">
        <span class="ihrss-nav-wordmark">IHRRS</span>
      </a>

      <a href="doctorlogin" class="ihrss-back-btn">
        <i class="bx bx-arrow-back"></i>
        Back
      </a>
    </nav>

    <main class="ihrss-main">
      <div id="login-form">
        <div class="card-header">
          <div class="role-badge">
            <span class="badge-dot"></span>
            Physician
          </div>

          <h2>Forgot Password</h2>
          <p class="card-sub">Submit your username and contact number for admin verification.</p>
        </div>

        <form id="forgotForm" action="php/physician_forgot_password.php" method="POST">
          <label>Username</label>
          <div class="input-box">
            <span class="icon"><i class="bx bx-user"></i></span>
            <input type="text" name="username" id="username" placeholder="Enter your username" required>
          </div>

          <label for="contact_number">Contact Number</label>
          <div class="input-box">
            <span class="icon"><i class="bx bx-phone"></i></span>
            <input type="text" name="contact_number" id="contact_number"
                   placeholder="Enter your contact number"
                   pattern="\d{11}"
                   title="Contact number must be exactly 11 digits"
                   required>
          </div>

          <button type="submit" class="login-btn">SUBMIT</button>
        </form>
      </div>
    </main>
  </div>

  <!-- Pending Request Modal -->
  <div id="pendingModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Request Pending</h3>
      <p>A password reset request is already pending. Please wait for admin approval.</p>
      <button id="pendingYesBtn" class="login-btn">Yes</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Request Submitted</h3>
      <p>Your request has been submitted. The admin will contact you soon.</p>
      <button onclick="window.location.href='doctorlogin'" class="login-btn">OK</button>
    </div>
  </div>

  <script>
    document.getElementById('contact_number').addEventListener('input', function (e) {
      const input = e.target;
      const value = input.value;

      input.value = value.replace(/\D/g, '');

      if (input.value.length > 11) {
        input.value = input.value.slice(0, 11);
      }
    });

    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = this;
      const formData = new FormData(form);

      fetch('php/physician_forgot_password.php', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('successModal').style.display = 'block';
          form.reset();
        } else if (data.error === "A password reset request is already pending. Please wait for admin approval.") {
          document.getElementById('pendingModal').style.display = 'block';
        } else {
          alert(data.error || "An error occurred.");
        }
      })
      .catch(() => alert("An error occurred. Please try again."));
    });

    // Handle "Yes" button in pending modal
    document.getElementById('pendingYesBtn').onclick = function() {
      window.location.href='doctorlogin';
    };

    // Optional: close modal when clicking outside (for both modals)
    window.onclick = function(event) {
      const pendingModal = document.getElementById('pendingModal');
      const successModal = document.getElementById('successModal');

      if (event.target == pendingModal) {
        pendingModal.style.display = "none";
      }

      if (event.target == successModal) {
        successModal.style.display = "none";
      }
    };
  </script>
</body>
</html>
