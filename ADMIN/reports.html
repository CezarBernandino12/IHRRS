<div id="logoutModal" class="logout-modal">

<script>
	function confirmLogout() {
		document.getElementById('logoutModal').style.display = 'block';
		return false; // Prevent the default link behavior
	}

	function closeModal() {
		document.getElementById('logoutModal').style.display = 'none';
	}

	function proceedLogout() {
		window.location.href='php/logout';
	}

	// Close modal when clicking outside
	window.onclick = function(event) {
		const modal = document.getElementById('logoutModal');
		if (event.target == modal) {
			closeModal();
		}
	}
	      // Check if user is logged in
		  fetch('php/getUserId.php')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    // User is not logged in, redirect to role selection page
                    window.location.href='../auth/role';
                }
            })
            .catch(error => {
                console.error('Error checking session:', error);
                window.location.href='../auth/role';
            });

	</script>

<script>
(function () {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  const overlay = document.getElementById('sidebarOverlay');
  const MOBILE_BP = 768;

  if (!sidebar || !toggle || !overlay) return;

  function isMobile() {
    return window.innerWidth <= MOBILE_BP;
  }

  function closeMobileSidebar() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function () {
    if (isMobile()) {
      const open = sidebar.classList.toggle('mobile-open');
      overlay.classList.toggle('active', open);
      document.body.style.overflow = open ? 'hidden' : '';
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });

  overlay.addEventListener('click', closeMobileSidebar);

  window.addEventListener('resize', function () {
    if (!isMobile()) {
      closeMobileSidebar();
    }
  });
})();

// Keep the BHW-style navbar search local to this page so the report contents remain intact.
document.addEventListener("DOMContentLoaded", () => {
  const searchInput = document.getElementById("patientSearch");
  const searchButton = document.getElementById("searchButton");

  function filterReports() {
    const searchTerm = (searchInput?.value || "").toLowerCase().trim();
    document.querySelectorAll(".box-info a").forEach(card => {
      card.style.display = card.textContent.toLowerCase().includes(searchTerm) ? "" : "none";
    });
  }

  if (searchInput && searchButton) {
    searchInput.addEventListener("input", filterReports);
    searchInput.addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        filterReports();
      }
    });
    searchButton.addEventListener("click", filterReports);
  }
});
</script>
