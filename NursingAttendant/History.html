		<main>

					</tbody>

<div id="logoutModal" class="logout-modal">

<script>

document.addEventListener("DOMContentLoaded", function () {
    const statusSelect = document.getElementById("status");
    const dateInput = document.getElementById("date");
    const applyFilterButton = document.getElementById("applyFilter");
    const tableBody = document.querySelector("#history-table tbody");
    const pagination = document.getElementById("pagination");

    let allReferralRows = [];
    let currentPage = 1;
    const rowsPerPage = 10;

    if (statusSelect) statusSelect.value = "All";
    fetchReferrals();

    if (applyFilterButton) {
        applyFilterButton.addEventListener("click", function () {
            currentPage = 1;
            fetchReferrals();
        });
    }

    if (statusSelect) {
        statusSelect.addEventListener("change", function () {
            currentPage = 1;
            fetchReferrals();
        });
    }

    if (dateInput) {
        dateInput.addEventListener("change", function () {
            currentPage = 1;
            fetchReferrals();
        });
    }

    function getStatusClass(status) {
        return String(status || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
    }

    function renderTablePage() {
        if (!tableBody) return;

        tableBody.innerHTML = "";

        if (!allReferralRows.length) {
            tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">No referrals found</td></tr>`;
            if (pagination) pagination.innerHTML = "";
            return;
        }

        const totalPages = Math.ceil(allReferralRows.length / rowsPerPage);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * rowsPerPage;
        const pageRows = allReferralRows.slice(start, start + rowsPerPage);

        pageRows.forEach(row => tableBody.appendChild(row));
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        if (!pagination) return;

        if (totalPages <= 1) {
            pagination.innerHTML = "";
            return;
        }

        let startPage = Math.max(1, currentPage - 1);
        let endPage = Math.min(totalPages, startPage + 2);

        if (endPage - startPage < 2) {
            startPage = Math.max(1, endPage - 2);
        }

        const parts = [];

        parts.push(`
            <button type="button" class="pagination-btn pagination-prev" aria-label="Previous page" data-page="${Math.max(1, currentPage - 1)}" ${currentPage === 1 ? "disabled" : ""}>
                ‹
            </button>
        `);

        for (let page = startPage; page <= endPage; page++) {
            parts.push(`
                <button type="button" class="pagination-page ${page === currentPage ? "active" : ""}" data-page="${page}">
                    ${page}
                </button>
            `);
        }

        parts.push(`
            <button type="button" class="pagination-btn pagination-next" aria-label="Next page" data-page="${Math.min(totalPages, currentPage + 1)}" ${currentPage === totalPages ? "disabled" : ""}>
                ›
            </button>
        `);

        pagination.innerHTML = parts.join("");

        pagination.querySelectorAll("button[data-page]").forEach(button => {
            button.addEventListener("click", function () {
                const nextPage = parseInt(this.dataset.page, 10);
                if (!Number.isNaN(nextPage)) {
                    currentPage = nextPage;
                    renderTablePage();
                }
            });
        });
    }

    function fetchReferrals() {
        const selectedDate = dateInput ? dateInput.value : "";
        const selectedStatus = statusSelect ? statusSelect.value : "All";

        const params = new URLSearchParams();
        if (selectedDate) params.append("date", selectedDate);
        if (selectedStatus && selectedStatus !== "All") params.append("status", selectedStatus);

        fetch("php/fetch_referrals_history.php?" + params.toString())
            .then(response => response.json())
            .then(data => {
                console.log("Fetched referrals:", data);

                allReferralRows = [];
                if (tableBody) tableBody.innerHTML = "";

                if (data.error) {
                    console.error(data.error);
                    if (tableBody) tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">Error fetching data</td></tr>`;
                    if (pagination) pagination.innerHTML = "";
                    return;
                }

                if (!data || data.length === 0) {
                    renderTablePage();
                    return;
                }

                data.forEach(referral => {
                    console.log("Referral object:", referral);

                    const row = document.createElement("tr");
                    row.style.cursor = "pointer";

                    row.addEventListener("click", () => {
                        if (referral.visit_id) {
                            window.location.href = `visitInfo?visit_id=${referral.visit_id}`;
                        } else {
                            alert("Missing visit_id for this referral.");
                            console.error("Referral missing visit_id:", referral);
                        }
                    });

                    const referralStatus = referral.referral_status || "";
                    const statusClass = getStatusClass(referralStatus);

                    row.innerHTML = `
                        <td data-label="Date">${formatDate(referral.referral_date)}</td>
                        <td data-label="Patient Name" class="patient-name-cell">${referral.patient_name}</td>
                        <td data-label="Referred by">${referral.referred_by}</td>
                        <td data-label="Status"><span class="status-pill ${statusClass}">${referralStatus}</span></td>
                    `;

                    allReferralRows.push(row);
                });

                renderTablePage();
            })
            .catch(error => {
                console.error("Error fetching referrals:", error);
                if (tableBody) tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">Error fetching data</td></tr>`;
                if (pagination) pagination.innerHTML = "";
            });
    }

    function formatDate(dateString) {
        if (!dateString) return "N/A";
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return "Invalid Date";
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return date.toLocaleDateString('en-US', options);
    }
});

fetch('php/getUserName.php')
    .then(response => response.json())
    .then(data => {
        const fullName = data.full_name || 'Nurse User';
        const sidebarName = document.getElementById('sidebarUserName');
        if (sidebarName) sidebarName.textContent = fullName;

                const rhuLabel = document.getElementById('rhuLabel');
        if (rhuLabel && data.rhu) {
            rhuLabel.textContent = data.rhu;
        }
    })
    .catch(error => {
        console.error('Error fetching user name:', error);
        const sidebarName = document.getElementById('sidebarUserName');
        if (sidebarName) sidebarName.textContent = 'Nurse User';
    });

    function confirmLogout() {
            document.getElementById('logoutModal').style.display = 'block';
            return false; // Prevent the default link behavior
        }
        
        function closeModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }
        
        function proceedLogout() {
            window.location.href='../ADMIN/php/logout'; 
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('logoutModal');
            if (event.target == modal) {
                closeModal();
            }
        } 
              // Check if user is logged in
              fetch('php/getUserId.php')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    // User is not logged in, redirect to role selection page
                    window.location.href='../auth/role';
                }
            })
            .catch(error => {
                console.error('Error checking session:', error);
                window.location.href='../auth/role';
            });

             // Initialize Flatpickr
    flatpickr(".flatpickr", {
        dateFormat: "Y-m-d",
        allowInput: true,
        altInput: true,
        altInputClass: "filter-date-alt",
        altFormat: "M j, Y",
        disableMobile: true
    });
        
</script>

<script>
(function () {
  const updateReferrals = document.getElementById('updateReferrals');
  if (!updateReferrals) return;

  updateReferrals.addEventListener('click', function (event) {
    event.preventDefault();

    fetch('php/update_referrals.php')
      .then(response => response.json())
      .then(data => {
        console.log(data.message);
        window.location.href = 'pending';
      })
      .catch(error => {
        console.error('Error updating referrals:', error);
        window.location.href = 'pending';
      });
  });
})();
</script>
<script>
(function () {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  const overlay = document.getElementById('sidebarOverlay');
  const MOBILE_BP = 768;

  function isMobile() {
    return window.innerWidth <= MOBILE_BP;
  }

  function closeMobileSidebar() {
    if (!sidebar || !overlay) return;
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  if (toggle && sidebar && overlay) {
    toggle.addEventListener('click', function () {
      if (isMobile()) {
        const open = sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('active', open);
        document.body.style.overflow = open ? 'hidden' : '';
      } else {
        sidebar.classList.toggle('collapsed');
      }
    });

    overlay.addEventListener('click', closeMobileSidebar);

    window.addEventListener('resize', function () {
      if (!isMobile()) {
        closeMobileSidebar();
      }
    });
  }
})();
</script>
<script>
(function () {
  const searchInput = document.getElementById('patientSearch');
  const searchButton = document.getElementById('searchButton');

  if (!searchInput || !searchButton) return;

  searchInput.addEventListener('keypress', function (event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      searchButton.click();
    }
  });

  searchButton.addEventListener('click', function () {
    const searchQuery = searchInput.value.trim();
    if (searchQuery) {
      sessionStorage.setItem('searchQuery', searchQuery);
      window.location.href = 'searchPatient';
    } else {
      alert('Please enter a patient name to search.');
    }
  });
})();
</script>
