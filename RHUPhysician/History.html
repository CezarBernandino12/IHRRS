<!DOCTYPE html>
<html lang="en">

	<!-- Sidebar Section -->

		<div class="sidebar-scroll">

				</li>
				<li>
					<a href="#" id="updateReferrals" data-tooltip="Pending Referrals">
						<i class="bx bxs-user nav-icon"></i>

				<li>

						<i class="bx bxs-user nav-icon"></i>

					</a>
				</li>
				<li>

					</a>
				</li>

						<i class="bx bx-history nav-icon"></i>

				</li>
				<li>

					<div class="user-role">RHU Physician</div>
				</div>
			</div>
		</div>
	</section>

	<!-- Main Content Section -->
	<section id="content">

			<button class="nav-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
				<i class="bx bx-menu"></i>
			</button>

			<form id="searchForm" onsubmit="return false;" class="nav-search" style="position: relative;">
				<input type="search" id="searchInput" placeholder="Search patient name..." autocomplete="off">
				<button type="submit" aria-label="Search">
					<i class="bx bx-search"></i>

			</form>

		<main>
            
            <div class="head-title">
                <div class="left">
                  <h1>Referral History</h1>
                </div>
              </div>

            <div class="history-toolbar-card">
                <div class="history-toolbar-actions history-toolbar-actions-only">
                    <div class="history-toolbar-field history-toolbar-field-date">
                        <label for="date" class="sr-only">Select date</label>
                        <i class="bx bx-calendar"></i>
                        <input type="text" id="date" name="date" class="flatpickr-date-input" placeholder="Select date" autocomplete="off" />
                    </div>

                    <div class="history-toolbar-field history-toolbar-field-select">
                        <label for="status" class="sr-only">Select Status</label>
                        <i class="bx bx-filter-alt"></i>
                        <select id="status" name="status">
                  <option value="All">All</option>
                  <option value="Completed">Completed</option>
                  <option value="Uncompleted">Uncompleted</option>
                </select>
                    </div>

                    <button id="applyFilter" class="history-primary-btn">Apply Filter</button>
                </div>
            </div>
            <div class="history-container history-table-card">
                <table id="history-table" class="status">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Patient Name</th>
							<th>Referred  by</th>
                            <th>Status</th>
                        </tr>
                    </thead>
					<tbody>
					</tbody>
					
                </table>
            </div>

            <div class="history-pagination" id="pagination" aria-label="Referral history pagination"></div>

<div id="logoutModal" class="logout-modal">
    <div class="logout-modal-content">
        <div class="logout-modal-header">
            <h3>Confirm Logout</h3>
        </div>
        <div class="logout-modal-body">
            <p>Are you sure you want to logout?</p>
        </div>
        <div class="logout-modal-footer">
            <button onclick="closeModal()" class="logout-cancel-btn">Cancel</button>
            <button onclick="proceedLogout()" class="logout-confirm-btn">Yes, Logout</button>
        </div>
    </div>
</div>


</main>	
</section>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const statusSelect = document.getElementById("status");
    const dateInput = document.getElementById("date");
    const applyFilterButton = document.getElementById("applyFilter");
    const searchInput = document.getElementById("searchInput");
    const tableBody = document.querySelector("#history-table tbody");
    const pagination = document.getElementById("pagination");


    if (window.flatpickr && dateInput) {
        flatpickr(dateInput, {
            dateFormat: "Y-m-d",
            altInput: true,
            altInputClass: "filter-date-alt",
            altFormat: "M j, Y",
            allowInput: true,
            disableMobile: true,
            clickOpens: true
        });
    }

    let allReferralRows = [];
    let filteredReferralRows = [];
    let currentPage = 1;
    const rowsPerPage = 10;

    // Set default status to show both completed and uncompleted
    if (statusSelect) statusSelect.value = "All";

    // Fetch referrals immediately when page loads
    fetchReferrals();

    // Add click event listener to the "applyFilter" button to fetch referrals
    if (applyFilterButton) {
        applyFilterButton.addEventListener("click", function () {
            currentPage = 1;
            fetchReferrals();
        });
    }

    // Add search functionality while keeping pagination
    if (searchInput) {
        searchInput.addEventListener("input", function () {
            currentPage = 1;
            applySearchFilter();
        });
    }

    function getStatusClass(status) {
        return String(status || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
    }

    function applySearchFilter() {
        const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : "";

        if (!searchTerm) {
            filteredReferralRows = [...allReferralRows];
        } else {
            filteredReferralRows = allReferralRows.filter(row => {
                const patientNameCell = row.querySelector('[data-label="Patient Name"]');
                const patientName = patientNameCell ? patientNameCell.textContent.toLowerCase() : "";
                return patientName.includes(searchTerm);
            });
        }

        renderTablePage();
    }

    function renderTablePage() {
        if (!tableBody) return;

        tableBody.innerHTML = "";

        if (!filteredReferralRows.length) {
            tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">No referrals found</td></tr>`;
            if (pagination) pagination.innerHTML = "";
            return;
        }

        const totalPages = Math.ceil(filteredReferralRows.length / rowsPerPage);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start = (currentPage - 1) * rowsPerPage;
        const pageRows = filteredReferralRows.slice(start, start + rowsPerPage);

        pageRows.forEach(row => tableBody.appendChild(row));
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        if (!pagination) return;

        if (totalPages <= 1) {
            pagination.innerHTML = "";
            return;
        }

        let startPage = Math.max(1, currentPage - 1);
        let endPage = Math.min(totalPages, startPage + 2);

        if (endPage - startPage < 2) {
            startPage = Math.max(1, endPage - 2);
        }

        const parts = [];

        parts.push(`
            <button type="button" class="pagination-btn pagination-prev" aria-label="Previous page" data-page="${Math.max(1, currentPage - 1)}" ${currentPage === 1 ? "disabled" : ""}>
                ‹
            </button>
        `);

        for (let page = startPage; page <= endPage; page++) {
            parts.push(`
                <button type="button" class="pagination-page ${page === currentPage ? "active" : ""}" data-page="${page}">
                    ${page}
                </button>
            `);
        }

        parts.push(`
            <button type="button" class="pagination-btn pagination-next" aria-label="Next page" data-page="${Math.min(totalPages, currentPage + 1)}" ${currentPage === totalPages ? "disabled" : ""}>
                ›
            </button>
        `);

        pagination.innerHTML = parts.join("");

        pagination.querySelectorAll("button[data-page]").forEach(button => {
            button.addEventListener("click", function () {
                const nextPage = parseInt(this.dataset.page, 10);
                if (!Number.isNaN(nextPage)) {
                    currentPage = nextPage;
                    renderTablePage();
                }
            });
        });
    }

    // Function to fetch referrals data from the server
    function fetchReferrals() {
        // Get selected date and status from filters
        const selectedDate = dateInput ? dateInput.value : "";
        const selectedStatus = statusSelect ? statusSelect.value : "All";

        // Prepare query parameters
        const params = new URLSearchParams();
        if (selectedDate) params.append("date", selectedDate);
        if (selectedStatus && selectedStatus !== "All") params.append("status", selectedStatus);

        // Fetch referrals from the server
        fetch("php/fetch_referrals_history.php?" + params.toString())
            .then(response => response.json())
            .then(data => {
                console.log("Fetched referrals:", data);

                allReferralRows = [];
                filteredReferralRows = [];
                if (tableBody) tableBody.innerHTML = "";

                // Handle case where there's an error in the response
                if (data.error) {
                    console.error(data.error);
                    if (tableBody) tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">Error fetching data</td></tr>`;
                    if (pagination) pagination.innerHTML = "";
                    return;
                }

                // Handle case where no referrals are found
                if (!data || data.length === 0) {
                    applySearchFilter();
                    return;
                }

                // Loop through each referral and create a table row
                data.forEach(referral => {
                    console.log("Referral object:", referral);

                    const row = document.createElement("tr");
                    row.style.cursor = "pointer";

                    // Add click event listener for each row
                    row.addEventListener("click", () => {
                        if (referral.visit_id) {
                            window.location.href = `visitInfo?visit_id=${referral.visit_id}`;
                        } else {
                            alert("Missing visit_id for this referral.");
                            console.error("Referral missing visit_id:", referral);
                        }
                    });

                    const referralStatus = referral.referral_status || "";
                    const statusClass = getStatusClass(referralStatus);

                    // Add row content (referral data) to the table
                    row.innerHTML = `
                        <td data-label="Date">${formatDate(referral.referral_date)}</td>
                        <td data-label="Patient Name" class="patient-name-cell">${referral.patient_name}</td>
                        <td data-label="Referred by">${referral.referred_by}</td>
                        <td data-label="Status"><span class="status-pill ${statusClass}">${referralStatus}</span></td>
                    `;

                    allReferralRows.push(row);
                });

                applySearchFilter();
            })
            .catch(error => {
                console.error("Error fetching referrals:", error);
                if (tableBody) tableBody.innerHTML = `<tr class="empty-state-row"><td colspan="4">Error fetching data</td></tr>`;
                if (pagination) pagination.innerHTML = "";
            });
    }

    // Helper function to format date in a readable way
    function formatDate(dateString) {
        if (!dateString) return "N/A";
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return "Invalid Date";
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return date.toLocaleDateString('en-US', options);
    }
});

function confirmLogout() {
    document.getElementById('logoutModal').style.display = 'block';
    return false; // Prevent the default link behavior
}

function closeModal() {
    document.getElementById('logoutModal').style.display = 'none';
}

function proceedLogout() {
    window.location.href='../auth/role';
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('logoutModal');
    if (event.target == modal) {
        closeModal();
    }
}
fetch('php/getUserName.php')
    .then(response => response.json())
    .then(data => {
        if (data.full_name) {
            document.getElementById('sidebarUserName').textContent = data.full_name;
        } else {
            document.getElementById('sidebarUserName').textContent = 'Physician User';
        }
    })
    .catch(error => {
        console.error('Error fetching user name:', error);
        document.getElementById('sidebarUserName').textContent = 'Physician User';
    });

    	// Check if user is logged in
fetch('php/getUserId.php')
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            // User is not logged in, redirect to role selection page
            window.location.href='../auth/role';
        }
    })
    .catch(error => {
        console.error('Error checking session:', error);
        window.location.href='../auth/role';
    });


</script>

<script>
(function () {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  const overlay = document.getElementById('sidebarOverlay');
  const MOBILE_BP = 768;

  if (!sidebar || !toggle || !overlay) return;

  function isMobile() {
    return window.innerWidth <= MOBILE_BP;
  }

  function closeMobileSidebar() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function () {
    if (isMobile()) {
      const open = sidebar.classList.toggle('mobile-open');
      overlay.classList.toggle('active', open);
      document.body.style.overflow = open ? 'hidden' : '';
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });

  overlay.addEventListener('click', closeMobileSidebar);

  window.addEventListener('resize', function () {
    if (!isMobile()) {
      closeMobileSidebar();
    }
  });
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const updateReferrals = document.getElementById("updateReferrals");

  if (updateReferrals) {
    updateReferrals.addEventListener("click", function (event) {
      event.preventDefault();

      fetch("php/update_referrals.php")
        .then(response => response.json())
        .then(data => {
          console.log(data.message);
          window.location.href = "pending";
        })
        .catch(error => {
          console.error("Error updating referrals:", error);
          window.location.href = "pending";
        });
    });
  }
});
</script>
